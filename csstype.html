<!DOCTYPE html>
<html>
<head>
    <title>Student Result Dashboard</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Internal CSS -->
    <style>

        table{
            width: 60%;
            margin: auto;
            border-collapse: collapse;
            background-color: white;
        }

        th, td{
            border: 2px solid black;
            padding: 10px;
            text-align: center;
        }

        th{
            background-color: darkblue;
            color: white;
        }

    </style>

</head>

<body>

    <h1>Student Result Dashboard</h1>

    <h2>Semester Result</h2>

    <table>

        <tr>
            <th>Subject</th>
            <th>Marks</th>
            <th>Grade</th>
        </tr>

        <tr>
            <td>HTML</td>
            <td>85</td>
            <td>A</td>
        </tr>

        <tr style="background-color: yellow; font-weight: bold;">
            <td>CSS</td>
            <td>95</td>
            <td>A+</td>
        </tr>

        <tr>
            <td>JavaScript</td>
            <td>80</td>
            <td>A</td>
        </tr>

        <tr>
            <td>PHP</td>
            <td>75</td>
            <td>B+</td>
        </tr>

    </table>

</body>
</html>
