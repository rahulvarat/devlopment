<!DOCTYPE html>
<html>
<head>
    <title>I2IT TechCon 2025</title>

    <style>
        body{
            font-family: Arial;
            margin: 20px;
            background-color: #f2f2f2;
        }

        header{
            background-color: darkblue;
            color: white;
            text-align: center;
            padding: 20px;
        }

        nav{
            background-color: lightgray;
            padding: 10px;
            text-align: center;
        }

        nav a{
            text-decoration: none;
            margin: 15px;
            color: blue;
            font-weight: bold;
        }

        table{
            width: 100%;
            border-collapse: collapse;
            background-color: white;
        }

        table, th, td{
            border: 1px solid black;
        }

        th, td{
            padding: 10px;
            text-align: center;
        }

        form{
            background-color: white;
            padding: 20px;
            width: 300px;
        }

        input, textarea{
            width: 100%;
            margin-bottom: 10px;
            padding: 8px;
        }

        button{
            background-color: darkblue;
            color: white;
            padding: 10px;
            border: none;
            width: 100%;
        }
    </style>
</head>

<body>

    <header>
        <h1>I2IT TechCon 2025</h1>
        <p>Welcome to the Annual Technology Conference</p>
    </header>

    <nav>
        <a href="#about">About</a>
        <a href="#schedule">Schedule</a>
        <a href="#contact">Contact</a>
    </nav>

    <h2 id="about">About</h2>
    <p>
        I2IT TechCon 2025 is a technology event for students and developers.
    </p>

    <h2 id="schedule">Schedule</h2>

    <table>
        <tr>
            <th>Time</th>
            <th>Event</th>
        </tr>

        <tr>
            <td>10:00 AM</td>
            <td>Opening Ceremony</td>
        </tr>

        <tr>
            <td>11:00 AM</td>
            <td>AI Workshop</td>
        </tr>

        <tr>
            <td>2:00 PM</td>
            <td>Web Development Session</td>
        </tr>
    </table>

    <h2 id="contact">Contact</h2>

    <form>
        Name:
        <input type="text">

        Email:
        <input type="email">

        Message:
        <textarea></textarea>

        <button type="submit">Submit</button>
    </form>

</body>
</html>
