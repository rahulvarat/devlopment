<!DOCTYPE html>
<html>
    <head>
        <title>portfolio page</title>
        <style>
            form{
                width:400px;
                margin :auto;
                background-color: lightpink;
                 padding:10px;
                border:1px solid white;
                border-radius: 8px;
                
               

            }
            h1{
                color:darkblue;
            }
            body{
                background-color:rgb(132, 219, 190);
            }
              

            input[type="submit"], input[type="reset"]{
                background-color:darkblue;
                color:white;
                padding:6px 10px;


            }
        </style>
    </head>
    <body>
        <h1 align="center"><u> student portfolio</u></h1>
        <form>
            <P>
                <b>Name:</b><br>
                <input type="text" placeholder="enter the name">
            </P>

            <P>
                <b>Courses:</b><br>
                <input type="radio" name="Courses" value="BCA">BCA<br>
                <input type="radio" name="courses" value="MCA">MCA<br>
                   <input type="radio" name="courses" value="MTECH">MTECH<br>
                      <input type="radio" name="courses" value="BTECH">BTECH<br>

            </P>


            <p>
                <b>HOBBIES:</b><br>
                <input type="checkbox" name="hobby" value="Reading">Reading<br>
                <input type="checkbox" name="hobby" value="writing">Writing<br>
                <input type="checkbox" name="hobby" value="cricket">cricket<br>
                <input type="checkbox" name="hobby" value="sports">sports<br>

            </p>


            <p>
                <b>about section</b><br>
                <textarea row="4" col="30" placeholder="write somthing about you"></textarea>
            </p>

            <p> 
                <input type="submit" value="submit">
                <input type="reset" value="reset">
            </p>
        </form>

        

    </body>
</html>
